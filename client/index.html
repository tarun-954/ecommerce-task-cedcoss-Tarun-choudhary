<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundHub Pro - Wireless Noise Cancelling Headphones</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500&family=Metropolis:wght@400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#c3f5ff",
              "primary-fixed-dim": "#00daf3",
              surface: "#051424",
              "surface-container": "#122131",
              "surface-container-highest": "#273647",
              "surface-container-lowest": "#010f1f",
              "on-surface": "#d4e4fa",
              "outline-variant": "#3b494c",
              "secondary-container": "#ffdb3c",
            },
            spacing: {
              "margin-mobile": "20px",
              "margin-desktop": "64px",
              "container-max": "1440px",
              gutter: "24px",
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
